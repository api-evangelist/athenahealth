aid: athenahealth
name: athenahealth
description: athenahealth is a cloud-based healthcare network offering REST APIs for
  electronic health records (EHR), practice management, patient portal, revenue cycle
  management, and care coordination across ambulatory and acute care settings. The
  platform provides over 800 API endpoints enabling developers to extend athenaOne
  and integrate clinical, financial, and operational workflows across a national network
  of 84,000+ care sites.
