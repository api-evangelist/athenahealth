apis:
- aid: athenahealth:athenaone-apis
  name: athenaOne APIs
  description: The athenaOne proprietary REST API suite provides over 800 endpoints
    covering patient management, scheduling, clinical data, revenue cycle, and care
    coordination. Requires OAuth 2.0 authentication and supports both authorization
    code and client credentials grant types.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.athenahealth.com/api/docs/athenaone-apis
  baseURL: https://api.athenahealth.com/v1/
  tags:
  - EHR
  - Practice Management
  - Scheduling
  - Revenue Cycle
  - Patient Management
  properties:
  - type: Documentation
    url: https://docs.athenahealth.com/api/docs/athenaone-apis
  - type: Authentication
    url: https://docs.athenahealth.com/api/guides/authentication-and-url-locations
  - url: graphql/athenahealth-graphql.md
    type: GraphQL
- aid: athenahealth:fhir-apis
  name: FHIR APIs
  description: athenahealth FHIR R4 APIs provide standards-based access to clinical
    and administrative data. Supports SMART on FHIR scopes for compliant patient and
    provider-facing applications. Includes FHIR Subscriptions for webhook-based event
    notifications.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.athenahealth.com/api/docs/fhir-apis
  baseURL: https://api.athenahealth.com/fhir/r4/
  tags:
  - FHIR
  - Interoperability
  - Clinical Data
  - SMART on FHIR
  - HL7
  properties:
  - type: Documentation
    url: https://docs.athenahealth.com/api/docs/fhir-apis
  - type: GitHubRepository
    url: https://github.com/athenahealth/aone-fhir-subscriptions
- aid: athenahealth:athenaflex-api
  name: athenaFlex (athenaPractice/athenaFlow) API
  description: FHIR API Server for athenaPractice and athenaFlow products, enabling
    developers to build integrations with athenahealth's on-premise and hybrid deployment
    products using FHIR R4 standards.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://github.com/athenahealth/apiserver-athenaFlex
  baseURL: https://mydata.athenahealth.com/
  tags:
